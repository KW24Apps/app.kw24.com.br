<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Thumb — Relatório Parceiros TAX</title>
<style>
    /* Miniatura estática do Relatório Parceiros Nimbus TAX — identidade visual replicada
       de relatorios-bi/relatorio-parceiros-tax/assets/style.css (só leitura, não alterado).
       Dados 100% fictícios. Canvas fixo 320x170 — escalado pelo hub via CSS transform. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 320px;
        height: 170px;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        background: linear-gradient(160deg, #0b1f2a 0%, #0e2c3a 100%);
    }
    .wrap { padding: 10px 12px; }
    .brand {
        font-family: 'Rubik', sans-serif;
        font-weight: 700;
        font-size: 12px;
        color: #0DC2FF;
        letter-spacing: .02em;
        margin-bottom: 8px;
    }
    .kpis { display: flex; gap: 6px; margin-bottom: 8px; }
    .kpi {
        flex: 1;
        background: #fff;
        border-radius: 6px;
        padding: 6px 7px;
    }
    .kpi-label {
        font-size: 6.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: #64748b;
        margin-bottom: 2px;
    }
    .kpi-value {
        font-size: 12px;
        font-weight: 800;
        color: #1a202c;
    }
    .row { display: flex; gap: 6px; }
    .chart-card, .table-card {
        background: #fff;
        border-radius: 6px;
        padding: 7px 8px;
    }
    .chart-card { width: 96px; display: flex; align-items: center; justify-content: center; }
    .table-card { flex: 1; }
    .donut {
        width: 62px; height: 62px; border-radius: 50%;
        background: conic-gradient(#0DC2FF 0% 45%, #26FF93 45% 72%, #e2e8f0 72% 100%);
        position: relative;
    }
    .donut::after {
        content: '';
        position: absolute; inset: 12px;
        border-radius: 50%;
        background: #fff;
    }
    .tbl-row { display: flex; justify-content: space-between; font-size: 7px; color: #4a5568; padding: 2.5px 0; border-bottom: 1px solid #e2e8f0; }
    .tbl-row:last-child { border-bottom: none; }
    .tbl-row b { color: #1a202c; }
</style>
</head>
<body>
    <div class="wrap">
        <div class="brand">NIMBUS TAX</div>
        <div class="kpis">
            <div class="kpi"><div class="kpi-label">Parceiros</div><div class="kpi-value">42</div></div>
            <div class="kpi"><div class="kpi-label">Oportunidades</div><div class="kpi-value">118</div></div>
            <div class="kpi"><div class="kpi-label">Conversão</div><div class="kpi-value">68%</div></div>
        </div>
        <div class="row">
            <div class="chart-card"><div class="donut"></div></div>
            <div class="table-card">
                <div class="tbl-row"><span>Parceiro Alfa</span><b>R$ 32k</b></div>
                <div class="tbl-row"><span>Parceiro Beta</span><b>R$ 21k</b></div>
                <div class="tbl-row"><span>Parceiro Gama</span><b>R$ 14k</b></div>
                <div class="tbl-row"><span>Parceiro Delta</span><b>R$ 9k</b></div>
            </div>
        </div>
    </div>
</body>
</html>
